---
version: "2"

run:
  timeout: 5m
  issues-exit-code: 1
  tests: true

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic  # auto-fix
    - errorlint  # auto-fix
    - exhaustive
    - copyloopvar
    - intrange
    - modernize
    - prealloc
    - perfsprint
    - rowserrcheck
    - sqlclosecheck
    - unconvert
    - whitespace  # auto-fix
    - usestdlibvars
    - wrapcheck
    - wsl_v5  # auto-fix
    - dupword  # auto-fix
    - mirror  # auto-fix
    - iface  # auto-fix
    - godot  # auto-fix
    - goheader  # auto-fix
  settings:
    gocritic:
      enable-all: false
    whitespace:
      skip-generated: true
  exclusions:
    rules:
      - linters:
          - errcheck
        path: '.*_test\.go'
        text: 'Error return value of `.*\.Close` is not checked'
      - linters:
          - wrapcheck
        path: '.*_test\.go'
      - linters:
          - wrapcheck
        path: '^cli/.*\.go'
      - linters:
          - wrapcheck
        path: '^internal/testsupport/.*\.go'
      - linters:
          - wrapcheck
        path: '^internal/ops/.*\.go'
      - linters:
          - wrapcheck
        path: '^tui/runtime/.*\.go'
      - linters:
          - wrapcheck
        path: '^tui/.*\.go'
      - linters:
          - wrapcheck
        path: '^usecase/.*\.go'

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
